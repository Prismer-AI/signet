name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - name: Clippy
        run: cargo clippy --workspace -- -D warnings
      - name: Test
        run: cargo test --workspace

  wasm:
    name: WASM Build + Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Install wasm-pack
        run: cargo install wasm-pack
      - name: Build WASM
        run: wasm-pack build bindings/signet-ts --target nodejs --out-dir pkg
      - name: Run WASM tests
        run: node examples/wasm-roundtrip/test.mjs

  typescript:
    name: TypeScript Tests
    runs-on: ubuntu-latest
    needs: wasm
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install wasm-pack
        run: cargo install wasm-pack
      - name: Build WASM into packages
        run: wasm-pack build bindings/signet-ts --target nodejs --out-dir ../../packages/signet-core/wasm
      - name: Build @signet/core
        working-directory: packages/signet-core
        run: npx tsc && cp -r wasm dist/wasm
      - name: Install @signet/mcp deps
        working-directory: packages/signet-mcp
        run: npm install
      - name: Build @signet/mcp
        working-directory: packages/signet-mcp
        run: npx tsc
      - name: Test @signet/core
        working-directory: packages/signet-core
        run: node --test dist/tests/core.test.js
      - name: Test @signet/mcp
        working-directory: packages/signet-mcp
        run: node --test dist/tests/mcp.test.js
