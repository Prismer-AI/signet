name: Publish OpenClaw plugin

on:
  pull_request:
    paths:
      - "packages/signet-openclaw-plugin/**"
      - ".github/workflows/openclaw-plugin-publish.yml"
  workflow_dispatch:
  push:
    tags:
      - "openclaw-plugin-v*"

permissions:
  contents: read

jobs:
  build:
    name: Build plugin
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - name: Install workspace deps
        run: npm install --no-audit --no-fund
      - name: Build dependent packages
        working-directory: packages/signet-core
        run: npm run build
      - name: Build signet-node
        working-directory: packages/signet-node
        run: npm run build
      - name: Build openclaw plugin
        working-directory: packages/signet-openclaw-plugin
        run: npm run build

  dry-run:
    name: ClawHub dry-run (PR check)
    if: github.event_name == 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - name: Install workspace deps
        run: npm install --no-audit --no-fund
      - name: Build openclaw plugin
        working-directory: packages/signet-openclaw-plugin
        run: |
          (cd ../signet-core && npm run build)
          (cd ../signet-node && npm run build)
          npm run build
      - name: ClawHub package publish (dry run)
        run: bunx clawhub package publish ./packages/signet-openclaw-plugin --dry-run --json

  publish:
    name: ClawHub publish (tag or manual dispatch)
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/openclaw-plugin-v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - name: Install workspace deps
        run: npm install --no-audit --no-fund
      - name: Build openclaw plugin
        working-directory: packages/signet-openclaw-plugin
        run: |
          (cd ../signet-core && npm run build)
          (cd ../signet-node && npm run build)
          npm run build
      - name: ClawHub login
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
        run: bunx clawhub login --token "$CLAWHUB_TOKEN"
      - name: ClawHub package publish
        run: bunx clawhub package publish ./packages/signet-openclaw-plugin --json
