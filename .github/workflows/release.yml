name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  validate-version:
    name: Validate tag and managed versions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Check VERSION and tag
        run: node scripts/version-sync.mjs check --tag "${GITHUB_REF_NAME}"

  build:
    name: Build ${{ matrix.target }}
    needs: validate-version
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: signet-linux-amd64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: signet-linux-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: signet-darwin-amd64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: signet-darwin-arm64
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-04-08
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo '[target.aarch64-unknown-linux-gnu]' >> ~/.cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> ~/.cargo/config.toml
      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} -p signet-cli
      - name: Package
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/signet dist/${{ matrix.artifact }}
          chmod +x dist/${{ matrix.artifact }}
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  python:
    name: Python wheels (${{ matrix.target }})
    needs: validate-version
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64
          - os: ubuntu-latest
            target: aarch64
          - os: macos-latest
            target: x86_64
          - os: macos-latest
            target: aarch64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist -m bindings/signet-py/Cargo.toml
          manylinux: auto
      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.os }}-${{ matrix.target }}
          path: dist/*.whl

  python-sdist:
    name: Python sdist
    needs: validate-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist -m bindings/signet-py/Cargo.toml
      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  release:
    name: Attach binaries to release
    needs: [build, python, python-sdist]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*

  pypi:
    name: Publish to PyPI
    needs: [python, python-sdist]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheel-*
          path: dist
          merge-multiple: true
      - uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist
      - name: Publish to PyPI
        uses: PyO3/maturin-action@v1
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}
        with:
          command: upload
          args: --skip-existing dist/*

  crates:
    name: Publish to crates.io
    needs: [validate-version, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-04-08
      - name: Publish signet-core
        run: |
          cargo publish -p signet-core --allow-dirty 2>&1 | tee /tmp/publish-core.log || {
            if grep -q "already uploaded" /tmp/publish-core.log; then
              echo "Version already published, skipping."
            else
              cat /tmp/publish-core.log
              exit 1
            fi
          }
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
      - name: Wait for crates.io index
        run: sleep 30
      - name: Publish signet-cli
        run: |
          cargo publish -p signet-cli --allow-dirty 2>&1 | tee /tmp/publish-cli.log || {
            if grep -q "already uploaded" /tmp/publish-cli.log; then
              echo "Version already published, skipping."
            else
              cat /tmp/publish-cli.log
              exit 1
            fi
          }
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}

  npm:
    name: Publish to npm
    needs: validate-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-04-08
          targets: wasm32-unknown-unknown
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - name: Build WASM
        run: wasm-pack build bindings/signet-ts --target nodejs --out-dir ../../packages/signet-core/wasm
      - name: Install TypeScript globally
        run: npm install -g typescript
      - name: Build and publish @signet-auth/core
        run: |
          cd packages/signet-core
          npm install
          tsc
          rsync -a --exclude='.gitignore' wasm/ dist/wasm/
          npm publish --access public 2>&1 | tee /tmp/npm-pub.log || {
            if grep -q "previously published" /tmp/npm-pub.log; then
              echo "Version already published, skipping."
            else
              exit 1
            fi
          }
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Build and publish @signet-auth/mcp
        run: |
          cd packages/signet-mcp
          npm install
          tsc
          npm publish --access public 2>&1 | tee /tmp/npm-pub.log || {
            if grep -q "previously published" /tmp/npm-pub.log; then
              echo "Version already published, skipping."
            else
              exit 1
            fi
          }
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Build and publish @signet-auth/mcp-server
        run: |
          cd packages/signet-mcp-server
          npm install
          tsc
          npm publish --access public 2>&1 | tee /tmp/npm-pub.log || {
            if grep -q "previously published" /tmp/npm-pub.log; then
              echo "Version already published, skipping."
            else
              exit 1
            fi
          }
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Build and publish @signet-auth/mcp-tools
        run: |
          cd packages/signet-mcp-tools
          npm install
          tsc
          npm publish --access public 2>&1 | tee /tmp/npm-pub.log || {
            if grep -q "previously published" /tmp/npm-pub.log; then
              echo "Version already published, skipping."
            else
              exit 1
            fi
          }
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Build and publish @signet-auth/vercel-ai
        run: |
          cd packages/signet-vercel-ai
          npm install
          npx tsc
          npm publish --access public 2>&1 | tee /tmp/npm-pub.log || {
            if grep -q "previously published" /tmp/npm-pub.log; then
              echo "Version already published, skipping."
            else
              exit 1
            fi
          }
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Post-publish smoke test (npm)
        run: |
          echo "Waiting 30s for npm registry propagation..."
          sleep 30
          mkdir /tmp/npm-smoke && cd /tmp/npm-smoke
          npm init -y > /dev/null 2>&1
          npm install @signet-auth/core
          node -e "
            const { generateKeypair, sign, verify } = require('@signet-auth/core');
            const kp = generateKeypair();
            const action = { tool: 'test', params: {ok:true}, params_hash: '', target: 'mcp://smoke', transport: 'stdio' };
            const receipt = sign(kp.secretKey, action, 'smoke-agent', 'ci');
            if (!verify(receipt, kp.publicKey)) { process.exit(1); }
            console.log('npm smoke test PASSED: sign + verify roundtrip OK');
          "
          rm -rf /tmp/npm-smoke

  smoke-cargo:
    name: Post-publish smoke test (cargo)
    needs: crates
    runs-on: ubuntu-latest
    steps:
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-04-08
      - name: Smoke test cargo install
        run: |
          echo "Waiting 60s for crates.io index propagation..."
          sleep 60
          cargo install signet-cli || true
          signet identity generate --name smoke-test --unencrypted
          signet sign --key smoke-test --tool test --params '{}' --target mcp://smoke --no-log > /tmp/receipt.json
          signet verify /tmp/receipt.json --pubkey smoke-test
          echo "cargo smoke test PASSED: identity + sign + verify OK"
        env:
          SIGNET_HOME: /tmp/signet-smoke
