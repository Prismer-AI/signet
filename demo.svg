<svg xmlns="http://www.w3.org/2000/svg" width="820" height="520" viewBox="0 0 820 520">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e1e2e"/>
      <stop offset="100%" stop-color="#181825"/>
    </linearGradient>
  </defs>
  <style>
    .bg { fill: url(#bg); }
    .chrome { fill: #11111b; }
    .title { fill: #a6adc8; font-family: -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 13px; }
    .cmd { fill: #89b4fa; }
    .prompt { fill: #a6e3a1; }
    .out { fill: #cdd6f4; }
    .dim { fill: #6c7086; }
    .ok { fill: #a6e3a1; }
    .flag { fill: #cba6f7; }
    .arg { fill: #fab387; }
    .hdr { fill: #585b70; }
    .str { fill: #f9e2af; }
    text { font-family: 'SF Mono', 'Cascadia Code', 'JetBrains Mono', Menlo, Monaco, Consolas, 'Liberation Mono', monospace; font-size: 13px; }
  </style>

  <!-- Window frame -->
  <rect class="bg" width="820" height="520" rx="10" ry="10"/>
  <rect class="chrome" width="820" height="38" rx="10" ry="10"/>
  <rect class="chrome" y="28" width="820" height="10"/>
  <circle cx="22" cy="19" r="6" fill="#ed8796"/>
  <circle cx="42" cy="19" r="6" fill="#eed49f"/>
  <circle cx="62" cy="19" r="6" fill="#a6da95"/>
  <text class="title" x="410" y="24" text-anchor="middle">signet</text>

  <!-- sign -->
  <text y="68" x="20"><tspan class="prompt">$</tspan><tspan class="cmd"> signet sign</tspan><tspan class="flag"> --key</tspan><tspan class="arg"> deploy-bot</tspan><tspan class="flag"> --tool</tspan><tspan class="str"> github_create_issue</tspan><tspan class="out"> \</tspan></text>
  <text y="86" x="20"><tspan class="out">    </tspan><tspan class="flag">--params</tspan><tspan class="str"> '{"title":"fix auth bug","priority":"high"}'</tspan></text>
  <text y="110" x="20" class="dim">Receipt written to receipt.json</text>

  <!-- verify -->
  <text y="140" x="20"><tspan class="prompt">$</tspan><tspan class="cmd"> signet verify</tspan><tspan class="arg"> receipt.json</tspan><tspan class="flag"> --pubkey</tspan><tspan class="arg"> deploy-bot</tspan></text>
  <text y="164" x="20"><tspan class="ok">Valid:</tspan><tspan class="out"> "deploy-bot" signed "github_create_issue"</tspan></text>
  <text y="182" x="20" class="dim">       at 2026-03-31T10:53:17.643Z</text>

  <!-- audit -->
  <text y="214" x="20"><tspan class="prompt">$</tspan><tspan class="cmd"> signet audit</tspan><tspan class="flag"> --since</tspan><tspan class="arg"> 1h</tspan></text>
  <text y="240" x="20" class="hdr">TIME                          SIGNER        TOOL                   TARGET</text>
  <text y="256" x="20" class="hdr">────────────────────────────────────────────────────────────────────────────────</text>
  <text y="274" x="20" class="out">2026-03-31T10:53:17.643Z      deploy-bot    github_create_issue    mcp://github.local</text>
  <text y="292" x="20" class="out">2026-03-31T10:53:25.702Z      deploy-bot    slack_send_message     mcp://test</text>
  <text y="310" x="20" class="out">2026-03-31T10:53:25.704Z      deploy-bot    db_query               mcp://test</text>
  <text y="328" x="20" class="out">2026-03-31T10:53:25.707Z      deploy-bot    api_call               mcp://test</text>
  <text y="352" x="20" class="dim">4 records</text>

  <!-- verify chain -->
  <text y="384" x="20"><tspan class="prompt">$</tspan><tspan class="cmd"> signet verify</tspan><tspan class="flag"> --chain</tspan></text>
  <text y="408" x="20" class="dim">Verifying chain integrity...</text>
  <text y="426" x="20"><tspan class="ok">Chain intact:</tspan><tspan class="out"> 4 records verified</tspan></text>

  <!-- tagline -->
  <text y="470" x="20" class="dim">─────────────────────────────────────────────────────────────────────</text>
  <text y="492" x="20" class="hdr">sign · verify · audit — cryptographic receipts for AI agent actions</text>
</svg>
