<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Signet Audit Ledger</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;900&family=IBM+Plex+Mono:wght@400;500&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,600;1,8..60,400&display=swap" rel="stylesheet">
<style>
:root {
  --paper: #f8f5f0;
  --paper2: #f0ebe3;
  --ink: #1a1a1a;
  --ink2: #555;
  --ink3: #999;
  --rule: #d4cdc4;
  --rule2: #e8e2d9;
  --accent: #c41e1e;
  --accent2: #8b1a1a;
  --green: #2d6a2d;
  --green-bg: #e8f0e8;
  --red-bg: #f5e8e8;
  --blue: #1a4a7a;
  --yellow: #8a6d00;
  --yellow-bg: #f5f0dd;
  --serif: 'Playfair Display', 'Georgia', serif;
  --body: 'Source Serif 4', 'Georgia', serif;
  --mono: 'IBM Plex Mono', 'Menlo', monospace;
}
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--paper);
  color: var(--ink);
  font-family: var(--body);
  font-size: 15px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}
a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }

/* ── Masthead ── */
header {
  border-bottom: 3px double var(--ink);
  padding: 20px 0 16px;
  text-align: center;
  margin: 0 auto;
  max-width: 1100px;
}
header h1 {
  font-family: var(--serif);
  font-weight: 900;
  font-size: 36px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--ink);
}
header .dateline {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--ink3);
  letter-spacing: 0.05em;
  margin-top: 4px;
}
header .rule { border: none; border-top: 1px solid var(--rule); margin: 12px 0 0; }

/* ── Nav ── */
nav {
  display: flex;
  justify-content: center;
  gap: 0;
  max-width: 1100px;
  margin: 0 auto;
  border-bottom: 1px solid var(--rule);
}
nav button {
  background: none;
  border: none;
  font-family: var(--serif);
  font-size: 14px;
  font-weight: 600;
  color: var(--ink3);
  padding: 10px 24px;
  cursor: pointer;
  letter-spacing: 0.03em;
  border-bottom: 2px solid transparent;
  transition: color 0.2s;
}
nav button:hover { color: var(--ink); }
nav button.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
}

/* ── Main ── */
main {
  max-width: 1100px;
  margin: 0 auto;
  padding: 32px 24px 64px;
}

/* ── Section headings ── */
.section-head {
  font-family: var(--serif);
  font-size: 13px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--ink3);
  border-bottom: 1px solid var(--rule);
  padding-bottom: 6px;
  margin-bottom: 16px;
}

/* ── Filters ── */
.filters {
  display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap;
  align-items: center;
}
.filters select, .filters input {
  background: var(--paper);
  border: 1px solid var(--rule);
  color: var(--ink);
  padding: 7px 12px;
  font-family: var(--mono);
  font-size: 12px;
}
.filters input { width: 160px; }
.filters input.wide { width: 280px; }
.filters input::placeholder { color: var(--ink3); }
.filters button {
  background: var(--ink);
  border: none;
  color: var(--paper);
  padding: 7px 18px;
  cursor: pointer;
  font-family: var(--serif);
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  transition: background 0.15s;
}
.filters button:hover { background: var(--accent2); }
.filters-note {
  color: var(--ink3);
  font-size: 12px;
  margin: -10px 0 18px;
  font-style: italic;
}

/* ── Table ── */
table { width: 100%; border-collapse: collapse; }
th {
  text-align: left;
  font-family: var(--serif);
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--ink3);
  padding: 8px 12px;
  border-bottom: 2px solid var(--ink);
}
td {
  padding: 10px 12px;
  border-bottom: 1px solid var(--rule2);
  font-size: 13px;
}
tr { transition: background 0.1s; }
tr:hover { background: var(--paper2); }

/* ── Badges ── */
.badge {
  display: inline-block;
  padding: 1px 6px;
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.04em;
  border: 1px solid;
}
.badge-v1 { color: var(--blue); border-color: var(--blue); }
.badge-v2 { color: #6a3d8a; border-color: #6a3d8a; }
.badge-v3 { color: var(--green); border-color: var(--green); }
.badge-v4 { color: var(--accent); border-color: var(--accent); }
.badge-policy {
  color: var(--yellow);
  border-color: var(--yellow);
  background: var(--yellow-bg);
}
.badge-status-intent,
.badge-status-verified {
  color: var(--blue);
  border-color: var(--blue);
}
.badge-status-executed {
  color: var(--green);
  border-color: var(--green);
  background: var(--green-bg);
}
.badge-status-failed,
.badge-status-rejected,
.badge-status-deny {
  color: var(--accent);
  border-color: var(--accent);
  background: var(--red-bg);
}
.badge-status-requires_approval,
.badge-status-require_approval {
  color: var(--yellow);
  border-color: var(--yellow);
  background: var(--yellow-bg);
}

.mono { font-family: var(--mono); font-size: 12px; }

/* ── Delegation chain ── */
.chain-viz {
  margin: 8px 0;
  padding: 10px 14px;
  background: var(--yellow-bg);
  border-left: 3px solid var(--yellow);
  font-family: var(--mono);
  font-size: 12px;
}
.chain-arrow { color: var(--accent); margin: 0 6px; font-weight: 700; }
.chain-node { color: var(--ink); font-weight: 500; }
.chain-scope { color: var(--ink3); font-size: 11px; display: block; margin-top: 4px; }

/* ── Status cards ── */
.status-card {
  background: var(--paper);
  border: 1px solid var(--rule);
  padding: 32px;
  text-align: center;
  margin-bottom: 20px;
}
.status-icon { font-size: 40px; margin-bottom: 8px; }
.status-label {
  font-family: var(--serif);
  font-size: 22px;
  font-weight: 700;
}
.status-detail { color: var(--ink3); margin-top: 6px; font-size: 14px; }

/* ── Stat grid ── */
.stat-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 16px;
  margin-bottom: 32px;
}
.stat-card {
  background: var(--paper);
  border: 1px solid var(--rule);
  padding: 20px;
}
.stat-card .label {
  font-family: var(--serif);
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--ink3);
}
.stat-card .value {
  font-family: var(--serif);
  font-size: 28px;
  font-weight: 900;
  margin-top: 4px;
  color: var(--ink);
}

/* ── Bar chart ── */
.bar-chart { margin-top: 20px; }
.bar-section-title {
  font-family: var(--serif);
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--ink3);
  margin-bottom: 10px;
  padding-bottom: 4px;
  border-bottom: 1px solid var(--rule2);
}
.bar-row { display: flex; align-items: center; margin-bottom: 5px; }
.bar-label {
  width: 150px;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--ink2);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.bar-fill {
  height: 16px;
  background: var(--ink);
  min-width: 2px;
  transition: width 0.4s ease;
}
.bar-count {
  margin-left: 8px;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--ink3);
}

/* ── Detail panel ── */
.receipt-detail {
  background: var(--paper2);
  border: 1px solid var(--rule);
  border-left: 3px solid var(--ink3);
  padding: 14px 16px;
  margin: 6px 0 10px;
  font-family: var(--mono);
  font-size: 11px;
  line-height: 1.5;
  white-space: pre-wrap;
  word-break: break-all;
  color: var(--ink2);
  max-height: 400px;
  overflow-y: auto;
}

/* ── Break info ── */
.break-info {
  background: var(--red-bg);
  border: 1px solid var(--accent);
  border-left: 4px solid var(--accent);
  padding: 20px;
  margin-top: 20px;
}
.break-info h3 {
  font-family: var(--serif);
  color: var(--accent);
  margin-bottom: 10px;
  font-size: 16px;
}
.break-info p { margin-bottom: 4px; font-size: 13px; }
.break-info code { font-family: var(--mono); font-size: 11px; }

/* ── Progress bar ── */
.progress-bar {
  background: var(--rule2);
  height: 20px;
  overflow: hidden;
  margin: 16px 0;
}
.progress-fill { height: 100%; background: var(--green); transition: width 0.4s ease; }

.loading {
  color: var(--ink3);
  text-align: center;
  padding: 64px;
  font-family: var(--serif);
  font-style: italic;
  font-size: 16px;
}
.empty {
  color: var(--ink3);
  text-align: center;
  padding: 64px;
  font-style: italic;
}

/* ── Truncation warning ── */
.truncation-notice {
  color: var(--yellow);
  margin-bottom: 16px;
  padding: 10px 14px;
  background: var(--yellow-bg);
  border-left: 3px solid var(--yellow);
  font-size: 13px;
}
</style>
</head>
<body>
<header>
  <h1>Signet Audit Ledger</h1>
  <div class="dateline" id="dateline"></div>
  <hr class="rule">
</header>
<nav>
  <button onclick="navigate('timeline')" id="nav-timeline">Timeline</button>
  <button onclick="navigate('chain')" id="nav-chain">Chain Integrity</button>
  <button onclick="navigate('signatures')" id="nav-signatures">Signatures</button>
  <button onclick="navigate('stats')" id="nav-stats">Statistics</button>
</nav>
<main id="app"><div class="loading">Retrieving records...</div></main>

<script>
const $ = s => document.querySelector(s);
const h = (tag, attrs, ...kids) => {
  const el = document.createElement(tag);
  if (attrs) Object.entries(attrs).forEach(([k, v]) => {
    if (k === 'class') el.className = v;
    else if (k.startsWith('on')) el.addEventListener(k.slice(2), v);
    else el.setAttribute(k, v);
  });
  kids.flat().forEach(c => { if (c != null) el.append(c); });
  return el;
};

// Set dateline
$('#dateline').textContent = new Date().toLocaleDateString('en-US', {
  weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
}).toUpperCase();

let state = { view: 'timeline', expandedRow: null };

async function fetchJSON(url) {
  const res = await fetch(url);
  if (!res.ok) {
    const body = await res.json().catch(() => ({}));
    throw new Error(body.error || `HTTP ${res.status}`);
  }
  return res.json();
}

function receiptTime(r) {
  if (isPolicyViolation(r)) return r.ts;
  const v = r.v || 1;
  if (v === 1 || v === 4) return r.ts;
  if (v === 2) return r.ts_request;
  if (v === 3) return r.ts_response;
  return r.ts;
}
function receiptChain(r) {
  if (r.v !== 4 || !r.authorization?.chain) return null;
  return r.authorization.chain;
}
function receiptRootName(r) {
  const chain = receiptChain(r);
  if (!chain || chain.length === 0) return '';
  return chain[0].delegator.name;
}
function receiptTool(r) {
  return r.action?.tool || r.agent_receipt?.action?.tool || '';
}
function receiptSigner(r) {
  return r.signer?.name || r.agent_receipt?.signer?.name || r.agent || '';
}
function receiptTarget(r) {
  return r.action?.target || r.agent_receipt?.action?.target || '';
}
function isPolicyViolation(r) {
  return r.type === 'policy_violation';
}
function recordType(r) {
  if (isPolicyViolation(r)) return 'policy';
  return `v${r.v || 1}`;
}
function recordStatus(r) {
  return r.response?.outcome?.status || (isPolicyViolation(r) ? normalizePolicyStatus(r.decision || 'policy_violation') : 'intent');
}
function recordId(rec) {
  return rec.receipt?.id || rec.record_hash || '';
}
function kindBadge(r) {
  if (isPolicyViolation(r)) return h('span', {class: 'badge badge-policy'}, 'policy');
  const v = r.v || 1;
  return h('span', {class: `badge badge-v${v}`}, `v${v}`);
}
function statusBadge(status) {
  return h('span', {class: `badge badge-status-${status}`}, status);
}
function normalizePolicyStatus(decision) {
  if (decision === 'deny') return 'rejected';
  if (decision === 'require_approval') return 'requires_approval';
  return decision;
}

function navigate(view) {
  state.view = view;
  state.expandedRow = null;
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  const btn = $(`#nav-${view}`);
  if (btn) btn.classList.add('active');
  render();
}

function fmtTime(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  return d.toLocaleString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit' });
}

function truncate(s, n) {
  return s && s.length > n ? s.slice(0, n) + '\u2026' : (s || '');
}

function splitKeyRefs(raw) {
  return (raw || '')
    .split(/[\s,]+/)
    .map(v => v.trim())
    .filter(Boolean);
}

// ── Timeline ──

async function renderTimeline() {
  const app = $('#app');
  const since = $('#f-since')?.value || '24h';
  const tool = $('#f-tool')?.value || '';
  const signer = $('#f-signer')?.value || '';

  const filters = h('div', {class: 'filters'},
    h('select', {id: 'f-since', onchange: () => renderTimeline()},
      ...['1h','24h','7d','30d','all'].map(v =>
        Object.assign(h('option', {value: v === 'all' ? '' : v}, v === 'all' ? 'All time' : `Last ${v}`),
          {selected: (v === 'all' ? '' : v) === since})
      )
    ),
    h('input', {id: 'f-tool', placeholder: 'Tool name\u2026', value: tool}),
    h('input', {id: 'f-signer', placeholder: 'Signer name\u2026', value: signer}),
    h('button', {onclick: () => renderTimeline()}, 'Query')
  );

  app.replaceChildren(filters, h('div', {class: 'loading'}, 'Retrieving records\u2026'));

  let params = new URLSearchParams();
  if (since) params.set('since', since);
  if (tool) params.set('tool', tool);
  if (signer) params.set('signer', signer);
  params.set('limit', '200');

  try {
    const records = await fetchJSON(`/api/records?${params}`);
    if (!records.length) {
      app.replaceChildren(filters, h('div', {class: 'empty'}, 'No audit records found for the selected period.'));
      return;
    }

    const table = h('table', null,
      h('thead', null, h('tr', null,
        h('th', null, 'Timestamp'), h('th', null, 'Record'), h('th', null, 'Status'),
        h('th', null, 'Signer'), h('th', null, 'Tool'), h('th', null, 'Target'), h('th', null, 'Receipt')
      )),
      h('tbody', null, ...records.map((rec, i) => {
        const r = rec.receipt;
        const row = h('tr', {style: 'cursor:pointer', onclick: () => toggleRow(i, rec)},
          h('td', {class: 'mono'}, fmtTime(receiptTime(r))),
          h('td', null, kindBadge(r)),
          h('td', null, statusBadge(recordStatus(r))),
          h('td', null, receiptSigner(r)),
          h('td', {class: 'mono'}, receiptTool(r)),
          h('td', {class: 'mono'}, truncate(receiptTarget(r), 28)),
          h('td', {class: 'mono'}, truncate(recordId(rec), 20))
        );
        const detailParts = [];
        const outcome = r.response?.outcome;
        if (outcome) {
          detailParts.push(h('div', {class: 'chain-viz'},
            h('div', null,
              h('strong', null, 'Outcome: '),
              statusBadge(outcome.status)
            ),
            outcome.reason ? h('span', {class: 'chain-scope'}, `Reason: ${outcome.reason}`) : null,
            outcome.error ? h('span', {class: 'chain-scope'}, `Error: ${outcome.error}`) : null,
            r.server?.name ? h('span', {class: 'chain-scope'}, `Server: ${r.server.name}`) : null
          ));
        } else if (isPolicyViolation(r)) {
          const rules = Array.isArray(r.matched_rules) ? r.matched_rules.join(', ') : '';
          detailParts.push(h('div', {class: 'chain-viz'},
            h('div', null,
              h('strong', null, 'Policy Gate: '),
              statusBadge(recordStatus(r))
            ),
            r.decision ? h('span', {class: 'chain-scope'}, `Decision: ${r.decision}`) : null,
            r.reason ? h('span', {class: 'chain-scope'}, `Reason: ${r.reason}`) : null,
            r.policy ? h('span', {class: 'chain-scope'}, `Policy: ${r.policy}`) : null,
            rules ? h('span', {class: 'chain-scope'}, `Rules: ${rules}`) : null
          ));
        }
        const chain = receiptChain(r);
        if (chain && chain.length > 0) {
          const nodes = [];
          nodes.push(h('span', {class: 'chain-node'}, chain[0].delegator.name));
          for (const tok of chain) {
            nodes.push(h('span', {class: 'chain-arrow'}, '\u2192'));
            nodes.push(h('span', {class: 'chain-node'}, tok.delegate.name));
          }
          const sc = chain[chain.length - 1].scope;
          const rootPk = r.authorization?.root_pubkey || '';
          const scopeParts = [`tools: [${sc.tools.join(', ')}]`, `targets: [${sc.targets.join(', ')}]`, `depth: ${sc.max_depth}`];
          if (sc.expires) scopeParts.push(`expires: ${sc.expires}`);
          detailParts.push(h('div', {class: 'chain-viz'},
            h('div', null, h('strong', null, 'Delegation Chain: '), ...nodes),
            h('span', {class: 'chain-scope'}, `Scope: ${scopeParts.join('  ')}`),
            rootPk ? h('span', {class: 'chain-scope'}, `Root: ${rootPk.slice(0, 24)}\u2026`) : null
          ));
        }
        detailParts.push(h('pre', {class: 'receipt-detail'}, JSON.stringify(r, null, 2)));
        const detail = h('tr', {id: `detail-${i}`, style: 'display:none'},
          h('td', {colspan: '7'}, ...detailParts)
        );
        return [row, detail];
      }).flat())
    );

    app.replaceChildren(filters, table);
  } catch (e) {
    app.replaceChildren(filters, h('div', {class: 'empty'}, `Error: ${e.message}`));
  }
}

function toggleRow(i) {
  const el = $(`#detail-${i}`);
  if (!el) return;
  el.style.display = el.style.display === 'none' ? '' : 'none';
}

// ── Chain Integrity ──

async function renderChain() {
  const app = $('#app');
  app.replaceChildren(h('div', {class: 'loading'}, 'Verifying chain integrity\u2026'));

  try {
    const status = await fetchJSON('/api/chain-status');
    const card = h('div', {class: 'status-card'},
      h('div', {class: 'status-icon'}, status.valid ? '\u2713' : '\u2717'),
      h('div', {class: 'status-label', style: `color:${status.valid ? 'var(--green)' : 'var(--accent)'}`},
        status.valid ? 'Chain Intact' : 'Chain Broken'),
      h('div', {class: 'status-detail'}, `${status.total_records} records verified`)
    );

    const parts = [card];

    if (status.break_point) {
      const bp = status.break_point;
      parts.push(h('div', {class: 'break-info'},
        h('h3', null, 'Break Point Detected'),
        h('p', null, `File: `, h('code', null, bp.file)),
        h('p', null, `Line: `, h('code', null, String(bp.line))),
        h('p', null, `Expected: `, h('code', null, truncate(bp.expected_hash, 40))),
        h('p', null, `Actual: `, h('code', null, truncate(bp.actual_hash, 40)))
      ));
    }

    app.replaceChildren(...parts);
  } catch (e) {
    app.replaceChildren(h('div', {class: 'empty'}, `Error: ${e.message}`));
  }
}

// ── Signature Verification ──

async function renderSignatures() {
  const app = $('#app');
  const trustedAgent = $('#s-trusted-agent')?.value || '';
  const trustedServer = $('#s-trusted-server')?.value || '';

  const filters = h('div', null,
    h('div', {class: 'filters'},
      h('input', {
        id: 's-trusted-agent',
        class: 'wide',
        placeholder: 'Trusted agent keys or names (comma separated)\u2026',
        value: trustedAgent
      }),
      h('input', {
        id: 's-trusted-server',
        class: 'wide',
        placeholder: 'Trusted server keys or names (comma separated)\u2026',
        value: trustedServer
      }),
      h('button', {onclick: () => renderSignatures()}, 'Verify')
    ),
    h('div', {class: 'filters-note'},
      'Leave trust anchors blank for compatibility mode. Bilateral receipts without trusted keys are verified for integrity only and reported as warnings.')
  );

  app.replaceChildren(filters, h('div', {class: 'loading'}, 'Verifying signatures\u2026'));

  try {
    const params = new URLSearchParams();
    if (trustedAgent.trim()) params.set('trusted_agent_key', trustedAgent.trim());
    if (trustedServer.trim()) params.set('trusted_server_key', trustedServer.trim());
    const query = params.toString();
    const result = await fetchJSON(`/api/verify-signatures${query ? `?${query}` : ''}`);
    const pct = result.total > 0 ? (result.valid / result.total * 100) : 100;
    const allValid = result.valid === result.total;

    const card = h('div', {class: 'status-card'},
      h('div', {class: 'status-icon'}, allValid ? '\u2713' : '\u26A0'),
      h('div', {class: 'status-label', style: `color:${allValid ? 'var(--green)' : 'var(--yellow)'}`},
        `${result.valid} of ${result.total} Valid`),
      h('div', {class: 'progress-bar'},
        h('div', {class: 'progress-fill', style: `width:${pct}%;background:${allValid ? 'var(--green)' : 'var(--yellow)'}`})
      )
    );

    const parts = [filters, card];

    if (result.warnings && result.warnings.length > 0) {
      parts.push(h('div', {class: 'section-head'}, 'Verification Warnings'));
      const warningTable = h('table', null,
        h('thead', null, h('tr', null,
          h('th', null, 'Receipt'), h('th', null, 'File'), h('th', null, 'Line'), h('th', null, 'Reason')
        )),
        h('tbody', null, ...result.warnings.map(w =>
          h('tr', null,
            h('td', {class: 'mono'}, truncate(w.receipt_id, 24)),
            h('td', {class: 'mono'}, w.file),
            h('td', null, String(w.line)),
            h('td', null, w.reason)
          )
        ))
      );
      parts.push(warningTable);
    }

    if (result.failures && result.failures.length > 0) {
      parts.push(h('div', {class: 'section-head'}, 'Verification Failures'));
      const table = h('table', null,
        h('thead', null, h('tr', null,
          h('th', null, 'Receipt'), h('th', null, 'File'), h('th', null, 'Line'), h('th', null, 'Reason')
        )),
        h('tbody', null, ...result.failures.map(f =>
          h('tr', null,
            h('td', {class: 'mono'}, truncate(f.receipt_id, 24)),
            h('td', {class: 'mono'}, f.file),
            h('td', null, String(f.line)),
            h('td', null, f.reason)
          )
        ))
      );
      parts.push(table);
    }

    app.replaceChildren(...parts);
  } catch (e) {
    app.replaceChildren(filters, h('div', {class: 'empty'}, `Error: ${e.message}`));
  }
}

// ── Stats ──

async function renderStats() {
  const app = $('#app');
  app.replaceChildren(h('div', {class: 'loading'}, 'Compiling statistics\u2026'));

  try {
    const stats = await fetchJSON('/api/stats');

    const cards = h('div', {class: 'stat-grid'},
      h('div', {class: 'stat-card'},
        h('div', {class: 'label'}, 'Total Records'),
        h('div', {class: 'value'}, String(stats.total_records))
      ),
      h('div', {class: 'stat-card'},
        h('div', {class: 'label'}, 'Earliest Record'),
        h('div', {class: 'value', style: 'font-size:14px'}, fmtTime(stats.earliest))
      ),
      h('div', {class: 'stat-card'},
        h('div', {class: 'label'}, 'Latest Record'),
        h('div', {class: 'value', style: 'font-size:14px'}, fmtTime(stats.latest))
      ),
      h('div', {class: 'stat-card'},
        h('div', {class: 'label'}, 'Distinct Tools'),
        h('div', {class: 'value'}, String(Object.keys(stats.by_tool).length))
      ),
      h('div', {class: 'stat-card'},
        h('div', {class: 'label'}, 'Policy Violations'),
        h('div', {class: 'value'}, String(stats.by_record_type?.policy_violation || 0))
      )
    );

    const makeChart = (title, data) => {
      const entries = Object.entries(data).sort((a, b) => b[1] - a[1]);
      const max = entries.length > 0 ? entries[0][1] : 1;
      return h('div', {style: 'margin-bottom:28px'},
        h('div', {class: 'bar-section-title'}, title),
        h('div', {class: 'bar-chart'}, ...entries.slice(0, 15).map(([name, count]) =>
          h('div', {class: 'bar-row'},
            h('div', {class: 'bar-label'}, name),
            h('div', {class: 'bar-fill', style: `width:${count / max * 100}%`}),
            h('div', {class: 'bar-count'}, String(count))
          )
        ))
      );
    };

    const parts = [cards];
    if (stats.truncated) {
      parts.push(h('div', {class: 'truncation-notice'},
        `Showing statistics for the first ${stats.total_records} records. The audit log contains additional entries.`));
    }
    parts.push(makeChart('By Tool', stats.by_tool));
    parts.push(makeChart('By Signer', stats.by_signer));
    if (stats.by_record_type) parts.push(makeChart('By Record Type', stats.by_record_type));
    if (stats.by_outcome && Object.keys(stats.by_outcome).length) parts.push(makeChart('By Outcome', stats.by_outcome));
    parts.push(makeChart('By Version', stats.by_version));
    if (stats.by_authorization && Object.keys(stats.by_authorization).length) parts.push(makeChart('By Authorization', stats.by_authorization));
    if (stats.by_policy_decision && Object.keys(stats.by_policy_decision).length) parts.push(makeChart('By Policy Gate Decision', stats.by_policy_decision));
    app.replaceChildren(...parts);
  } catch (e) {
    app.replaceChildren(h('div', {class: 'empty'}, `Error: ${e.message}`));
  }
}

// ── Router ──

function render() {
  switch (state.view) {
    case 'timeline': renderTimeline(); break;
    case 'chain': renderChain(); break;
    case 'signatures': renderSignatures(); break;
    case 'stats': renderStats(); break;
  }
}

navigate('timeline');
</script>
</body>
</html>
